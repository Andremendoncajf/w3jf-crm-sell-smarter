<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128" width="512" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#33BDD7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#33BDD7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33BDD7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5FD9F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5FD9F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Abstract AI icon - hexagon neural network -->
  <g transform="translate(48, 64)">
    <!-- Outer hexagon -->
    <polygon points="0,-36 31.18,-18 31.18,18 0,36 -31.18,18 -31.18,-18"
             fill="none" stroke="#33BDD7" stroke-width="2.2" opacity="0.9"/>

    <!-- Inner hexagon -->
    <polygon points="0,-22 19.05,-11 19.05,11 0,22 -19.05,11 -19.05,-11"
             fill="none" stroke="#5FD9F0" stroke-width="1.6" opacity="0.5"/>

    <!-- Central node -->
    <circle cx="0" cy="0" r="4.5" fill="#33BDD7"/>

    <!-- Connection nodes -->
    <circle cx="0" cy="-28" r="2.5" fill="#33BDD7"/>
    <circle cx="24.25" cy="-14" r="2.5" fill="#33BDD7"/>
    <circle cx="24.25" cy="14" r="2.5" fill="#33BDD7"/>
    <circle cx="0" cy="28" r="2.5" fill="#33BDD7"/>
    <circle cx="-24.25" cy="14" r="2.5" fill="#33BDD7"/>
    <circle cx="-24.25" cy="-14" r="2.5" fill="#33BDD7"/>

    <!-- Connection lines -->
    <line x1="0" y1="-28" x2="0" y2="-4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
    <line x1="24.25" y1="-14" x2="4.5" y2="-4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
    <line x1="24.25" y1="14" x2="4.5" y2="4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="28" x2="0" y2="4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
    <line x1="-24.25" y1="14" x2="-4.5" y2="4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
    <line x1="-24.25" y1="-14" x2="-4.5" y2="-4.5" stroke="#33BDD7" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Main Text: W3JF -->
  <text x="145" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="44" font-weight="800" letter-spacing="3" fill="#FFFFFF">
    W<tspan fill="#33BDD7">3</tspan>JF
  </text>

  <!-- Tagline -->
  <text x="145" y="81" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="13" font-weight="400" letter-spacing="4.5" fill="#9CA3AF">
    AGÊNCIA DE IA
  </text>

  <!-- Vertical divider line -->
  <line x1="130" y1="35" x2="130" y2="85" stroke="#374151" stroke-width="1"/>
</svg>